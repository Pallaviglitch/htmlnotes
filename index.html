<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="mystyle.css">
<style>
/* element selector */
p {
  color: dimgray;
}

/* class selector */
.highlight {
  background-color: yellow;
}

/* id selector */

#intro {
  font-size: 20px;
}
</style>
</head>
<body>

<p id="intro">Welcome to CSS selectors.</p>
<p>This is a normal paragraph.</p>
<p class="highlight">This paragraph is highlighted.</p>

</body>
</html>



<!-- ============================= -->
<!-- Inline & Block Elements -->
<!-- ============================= -->

<!--
Block Elements

✔ Starts on a new line.

✔ Takes full width.

Examples:
<h1> <p> <div> <section> <form>
-->



<!--
Inline Elements

✔ Stays on the same line.

✔ Takes only required width.

Examples:
<span> <a> <b> <i> <img>
-->


<!--
Difference

Block  → New Line + Full Width

Inline → Same Line + Required Width
-->

<!--
Interview

Q. What is a Block Element?
Ans: Starts on a new line and takes full width.

Q. What is an Inline Element?
Ans: Stays on the same line and takes only required width.
-->
