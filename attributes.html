<!-- ========================================= -->
<!--              HTML ATTRIBUTES              -->
<!-- ========================================= -->

<!--
Definition:
Attributes provide additional information about an HTML element.

✔ Written inside the opening tag.
✔ Most attributes have a name and a value.
-->

<!-- ========================================= -->
<!-- Syntax -->
<!-- ========================================= -->

<!--
<tag attribute="value">Content</tag>
-->

<!-- Example -->

<a href="https://google.com">Google</a>

<!--
Tag        : <a>
Attribute  : href
Value      : https://google.com
-->

<hr>

<!-- ========================================= -->
<!-- Common HTML Attributes -->
<!-- ========================================= -->

<!--
id      -> Unique identifier for an element.

class   -> Groups multiple elements together.

style   -> Applies inline CSS.

title   -> Displays a tooltip when the mouse hovers.

href    -> Specifies the destination URL of a link.

src     -> Specifies the path of an image, audio, or video.

alt     -> Displays alternative text if an image cannot load.

width   -> Sets the width of an element.

height  -> Sets the height of an element.

target  -> Specifies where the linked document opens.
-->

<hr>

<!-- ========================================= -->
<!-- Examples -->
<!-- ========================================= -->

<!-- id -->

<h1 id="heading">Welcome</h1>

<!-- class -->

<p class="intro">Hello World</p>

<!-- style -->

<p style="color: blue;">Blue Text</p>

<!-- title -->

<p title="This is a tooltip">
    Hover over me
</p>

<!-- href -->

<a href="https://google.com">
    Visit Google
</a>

<br><br>

<!-- target -->

<a href="https://google.com" target="_blank">
    Open in New Tab
</a>

<br><br>

<!-- Image Attributes -->

<img src="cat.jpg"
     alt="Cat Image"
     width="200"
     height="150">

<hr>

<!-- ========================================= -->
<!-- Multiple Attributes -->
<!-- ========================================= -->

<!--
One element can have multiple attributes.
-->

<img src="cat.jpg"
     alt="Cat"
     width="200"
     height="150">

<hr>

<!-- ========================================= -->
<!-- Boolean Attributes -->
<!-- ========================================= -->

<!--
Some attributes do not need a value.
-->

<input type="text" required>

<input type="checkbox" checked>

<input disabled>

<hr>

<!-- ========================================= -->
<!-- Important Points -->
<!-- ========================================= -->

<!--

1. Attributes provide extra information about an element.

2. Attributes are written inside the opening tag.

3. Most attributes have a name and a value.

4. One element can have multiple attributes.

5. Attribute names should be written in lowercase.

-->

<hr>

<!-- ========================================= -->
<!-- Interview Questions -->
<!-- ========================================= -->

<!--

Q1. What is an HTML attribute?

Answer:
An HTML attribute provides additional information about an HTML element.

------------------------------------------------

Q2. Where are attributes written?

Answer:
Inside the opening tag.

------------------------------------------------

Q3. Can an element have multiple attributes?

Answer:
Yes.

Example:
<img src="cat.jpg" alt="Cat" width="200">

------------------------------------------------

Q4. Difference between Element and Attribute?

Element  -> Complete HTML structure.

Attribute -> Extra information about an element.

------------------------------------------------

Q5. What are Boolean Attributes?

Answer:
Attributes that do not require a value.

Examples:
required
checked
disabled

-->
